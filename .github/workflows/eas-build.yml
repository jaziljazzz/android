name: EAS preview build

on:
  push:
    branches:
      - "claude/**"
      - main
    paths:
      - "skipq/apps/customer-mobile/**"
      - "skipq/packages/**"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (development / preview / production)"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: skipq
        run: pnpm install --frozen-lockfile

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS
        working-directory: skipq/apps/customer-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build \
            --profile "$PROFILE" \
            --platform android \
            --non-interactive \
            --no-wait
